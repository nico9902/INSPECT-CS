# device settings
exp_name: experiment_1
base_dir: /mimer/NOBACKUP/groups/naiss2023-6-336/multimodal_os/PE-Insight/outputs
seed: 0
task: 1_month_mortality
inference: False
modalities: ['ehr', 'image', 'report']
device:
  cuda_device: cuda:0
  gpu_num_workers: 1

# data settings
data: 
  model_dir: experiments/model_dir
  report_dir: experiments/report_dir
  augmentation: True
  weighted_sample: True
  reports_hdf5_path: /mimer/NOBACKUP/groups/naiss2023-6-336/multimodal_os/PE-Insight/datasets/inspect2/reports_embedding/features.hdf5
  image_hdf5_path: /mimer/NOBACKUP/groups/naiss2023-6-336/multimodal_os/PE-Insight/datasets/inspect2/anon_pe_features_full_new/features.hdf5
  cohort_csv: /mimer/NOBACKUP/groups/naiss2023-6-336/multimodal_os/PE-Insight/data/ehr/output/labels_and_features/{task}/filtered_cohort.csv
  ehr_features_path:  /mimer/NOBACKUP/groups/naiss2023-6-336/multimodal_os/PE-Insight/datasets/inspect2/ehr_embedding/TruncatedSVD

# dataset
dataset:
  num_slices: 250
  sample_strategy: fix
  target: 1_month_mortality
  contextualize_slice: False
  
# loss settings
loss: 
  loss_fn: BCEWithLogitsLoss

# trainer settings
trainer:
  n_gpus: 1
  batch_size: 8
  learning_rate: 0.001
  epochs: 50
  lr_step_size: 10
  lr_gamma: 0.1
  strategy: auto
  val_check_interval: 1.0
  limit_val_batches: 1.0
  gradient_clip_val: 0
  precision: 32
  optimizer: 
    name: "AdamW"
    weight_decay: 0.02
  lr_scheduler: "StepLR" 
  alpha: 0.5

# model settings
model:
  name: "early"
  image_size: 6145
  report_size: 768
  ehr_size: 128
  dropout: 0.1
  temp: 0.6
  momentum: 0.1
  queue_size: 1024
  activation: "relu"
  pretrained: False
  reports_encoder: "yikuan8/Clinical-Longformer"
  save_model: True
  checkpoint_path: None
  fusion:
    add_contrast: True
    num_layer_img: 1
    num_layer_txt: 1
    num_layer_cross: 1
    embed_size: 512
    num_attention_heads: 8
    dropout: 0.1
    intermediate_multiplier: 0
    contrast_embed_dim: 64
    fusion_method: "concat"

# monitor display settings
monitor:
  mode: max
  metric: val_auc